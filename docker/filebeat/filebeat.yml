filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: '${DOCKER_HOST}'
      - decode_json_fields:
          fields: ['message']
          target: ''
          overwrite_keys: true
          add_error_key: true

output.logstash:
  hosts: ['logstash:5044']

processors:
  - add_fields:
      target: ''
      fields:
        service.namespace: arekta-ticketmaster

logging.level: info
logging.to_files: false
